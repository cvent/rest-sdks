name: Publish PUBLIC-JAVA
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write
"on":
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Enable test mode (dry-run only)'
        type: boolean
        default: true
        required: false
jobs:
  publish:
    uses: ./.github/workflows/sdk-publish.yaml
    with:
      target: public-java
      test_mode: ${{ github.event.inputs.test_mode }}
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      java_gpg_passphrase: ${{ secrets.JAVA_GPG_PASSPHRASE }}
      java_gpg_secret_key: ${{ secrets.JAVA_GPG_SECRET_KEY }}
      ossrh_password: ${{ secrets.OSSRH_PASSWORD }}
      ossrh_username: ${{ secrets.OSSRH_USERNAME }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
