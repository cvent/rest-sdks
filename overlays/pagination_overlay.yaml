            A filter query string narrows search results and supports the combination of logical and
            comparison operators. The filter adheres to the pattern filter='field' comparisonType
            'value'.


            Following are the comparison types that can be used in filter expressions:
              * equal: eq
              * not equal: ne
              * greater than: gt
              * greater or equal: ge
              * less than: lt
              * less than or equal: le

            The following fields are filterable:
              * status (eq|ne)
              * created (eq|ne|gt|ge|lt|le)
              * title (eq|ne)
              * code (eq|ne)
          schema:
            type: string
            example: status eq 'active' and created gt '2020-12-12T11:30:37.909Z' and title eq 'Survey Demo' and
              code ne 'NFWHF5DW46A'
  - target: $.paths["/standard-surveys"].get
    update:
      x-speakeasy-pagination:
        type: cursor
        inputs:
          - name: token
            in: parameters
            type: cursor
        outputs:
          nextCursor: $.paging.nextToken
  - target: $.paths["/standard-surveys/responses"].get
    update:
      parameters:
        - $ref: "#/components/parameters/after"
        - $ref: "#/components/parameters/before"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/token"
        - name: filter
          in: query
          required: false
          description: >
            A filter query string narrows search results and supports the combination of logical and
            comparison operators. The filter adheres to the pattern filter='field' comparisonType
            'value'.


            Following are the comparison types that can be used in filter expressions:
              * equal: eq

            The following fields are filterable:
              * survey.id (eq)
              * question.id (eq)
              * respondent.id (eq)

            Following are the limits for the number of fields that can be passed in filter:
              * survey.id (1)
              * question.id (100)
              * respondent.id (100)

            Usage:
              * Use only survey.id to get responses for all questions in the survey.
              * Use only question.id to get responses for specific questions, which may belong to different surveys or same survey.
              * Use only respondent.id to get responses for specific respondents.
              * Multiple question.id/respondent.id must be separated by 'or'. Eg, filter=question.id eq
                '04ca6ae2-0dc3-487b-953e-86d6abbdf7d3' or question.id eq '1983f506-a4a5-4a05-b3f6-ff7f7afc58f1'
              * question.id can be used in combination with respondent.id by 'AND' operator only.
          schema:
            type: string
            example: question.id eq '04ca6ae2-0dc3-487b-953e-86d6abbdf7d3' or question.id eq
              '1983f506-a4a5-4a05-b3f6-ff7f7afc58f1'
  - target: $.paths["/standard-surveys/responses"].get
    update:
      x-speakeasy-pagination:
        type: cursor
        inputs:
          - name: token
            in: parameters
            type: cursor
        outputs:
          nextCursor: $.paging.nextToken
