            The following fields are filterable:
              * id (eq|ne)
              * type (eq|ne)
          schema:
            type: string
            example: id eq '04ca6ae2-0dc3-487b-953e-86d6abbdf7d3' and type eq 'Standalone'
  - target: $.paths["/surveys"].get
