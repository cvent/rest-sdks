overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Pagination overlay
  version: 0.0.0
actions:
  - target: $.paths["/events/surveys/responses"].get
    update:
      parameters:
        - $ref: "#/components/parameters/after"
        - $ref: "#/components/parameters/before"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/token"
        - name: filter
          in: query
          required: false
          description: >
            A filter query string narrows search results and supports the combination of logical and
            comparison operators. The filter adheres to the pattern filter='field' comparisonType
            'value'.


            Following are the comparison types that can be used in filter expressions:
              * equal: eq
              * not equal: ne

            The following fields are filterable:
              * id (eq|ne)
              * respondent.id (eq|ne)
              * session.id (eq|ne)
              * speaker.id (eq|ne)
              * question.id (eq|ne)
              * event.id (eq|ne)
          schema:
            type: string
            example: id eq '04ca6ae2-0dc3-487b-953e-86d6abbdf7d3'
  - target: $.paths["/events/surveys/responses"].get
    update:
      x-speakeasy-pagination:
        type: cursor
        inputs:
          - name: token
            in: parameters
            type: cursor
        outputs:
          nextCursor: $.paging.nextToken
  - target: $.paths["/events/{id}/budget-items/allocations"].get
    update:
      parameters:
        - $ref: "#/components/parameters/id4"
        - $ref: "#/components/parameters/after"
        - $ref: "#/components/parameters/before"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/token"
        - name: filter
          in: query
          required: false
          description: >
            A filter query string narrows search results and supports the combination of logical and
            comparison operators.  The filter adheres to the pattern filter='field' comparisonType
            'value'.

            There are six comparison types that can be used in filter expressions:
              * equal: eq
              * not equal: ne
              * greater than: gt
              * greater or equal: ge
              * less than: lt
              * less than or equal: le

            The following fields are filterable:
               * budgetVersion.id (eq)
               * budgetItem.id (eq)
               * category.id (eq|ne)
               * subcategory.id (eq|ne)
               * generalLedger.id (eq|ne)
               * value (lt|le|gt|ge|eq)

            The following operators are available:
              * and
              * or
          schema:
            type: string
            example: category.id eq 'e9ee2669-65db-46f8-872c-dbafbf9b0e92' or value lt 1000
  - target: $.paths["/events/{id}/budget-items/allocations"].get
    update:
      x-speakeasy-pagination:
        type: cursor
        inputs:
          - name: token
            in: parameters
            type: cursor
        outputs:
          nextCursor: $.paging.nextToken
