            In case user wants to filter on multiple session IDs, they can use 'or' operator.

            Following are the comparison types that can be used in filter expressions:
              * equal: eq
              * not equal: ne

            The following fields are filterable:
              * id (eq|ne) [chapter id of the event survey]
              * type (eq|ne)
              * sessions (eq|ne)
          schema:
            type: string
            example: id eq '04ca6ae2-0dc3-487b-953e-86d6abbdf7d3' and type eq 'Session Feedback' and sessions
              eq  '04ca6ae2-0dc3-487b-953e-86d6abbdf7d3' or sessions eq
              '05ca6ae2-0dc3-487b-953e-86d6abbdf7d3'
