  - target: $.paths["/responses"].get
    update:
      parameters:
        - $ref: "#/components/parameters/after"
        - $ref: "#/components/parameters/before"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/token"
        - name: filter
          in: query
          required: false
          description: >
            A filter query string narrows search results and supports the combination of logical and
            comparison operators. The filter adheres to the pattern filter='field' comparisonType
            'value'.


            Following are the comparison types that can be used in filter expressions:
              * equal: eq
              * not equal: ne

            The following fields are filterable:
              * id (eq|ne)
              * survey.id (eq)
              * respondent.id (eq|ne)
              * event.id (eq)
              * session.id (eq)
              * question.id (eq)
              * chapter.id (eq)
              * attempt (eq)

            Usage:

            1. Use only survey.id to get responses for all questions in the survey.

            2. Use only question.id to get responses for specific questions, which may belong to one
            or more surveys.

            3. Use only chapter.id to get responses for all questions in the chapter of a particular
            survey.

            4. Use only respondent.id to get responses for specific respondents.

            5. chapter.id and survey.id cannot be used in combination with any other fields.

            6. Multiple chapter.id or survey.id must be separated by 'OR'. For example:
            filter=chapter.id eq '04ca6ae2-0dc3-487b-953e-86d6abbdf7d3' or chapter.id eq
            '1983f506-a4a5-4a05-b3f6-ff7f7afc58f1'

            7. question.id can be used in combination with any other field by 'AND' operator only.
          schema:
            type: string
            example: question.id eq '04ca6ae2-0dc3-487b-953e-86d6abbdf7d3' or question.id eq
              '1983f506-a4a5-4a05-b3f6-ff7f7afc58f1'
