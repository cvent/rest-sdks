    update: |
      # Introduction
      The Cvent API Platform is built around REST. We aim to provide intuitive endpoints that can be easily
      discovered to help leverage the Cvent platform for your event needs. The RESTful APIs outlined here
      use JSON-encoded request and response format, along with HTTP codes, to convey processing status of
      requests received. The Cvent resources are protected using OAuth2.

      # Getting Started

      This SDK is generated by [Speakeasy](https://speakeasy.com). For usage instructions and code examples,
      refer to the README and USAGE files included in this package. To obtain API credentials, visit the
      [Cvent REST API Overview](https://developers.cvent.com/docs/rest-api/overview).

      The Cvent REST API uses [OAuth2](https://oauth.net/2/) for authorization. The client credentials flow is supported.
      Authorization code flow is only supported for planner users with the administrator role in Cvent.

      ## Endpoints

      Endpoints start with `hostName` and `version`.

      The `hostname` will depend on the region that your Cvent account is hosted in:

      | Region        | Hostname                           |
      |:--------------|:-----------------------------------|
      | North America | https://api-platform.cvent.com     |
      | Europe        | https://api-platform-eur.cvent.com |

      The current `version` of the Cvent API is `ea`.

      ## Rate Limits

      Cvent APIs enforce rate limits to ensure platform stability. Your limits depend on your tier: Free,
      Standard, or Premium.

      ### Usage Tiers

      | Tier     | Daily Calls | Calls per Second | Max Burst |
      | -------- | ----------- | ---------------- | --------- |
      | Free     | 1,000       | 2                | 1         |
      | Standard | 15,000      | 10               | 10        |
      | Premium  | 500,000     | 25               | 25        |

      - **Daily calls** define how many requests you can make in a 24-hour period. Quota resets at 12 midnight (+0 GMT).
      - **Calls per second** define how many requests you can make in a 1-second window.
      - **Max Burst** defines how many requests you can make at once.

      Check your tier via [Get Current Usage Tier](#operation/getUsageTier). These limits may change as the platform evolves.

      ### Handling Rate Limits

      When you exceed rate limits, the API returns `429 Too Many Requests`. Implement exponential backoff
      to handle these errors gracefully. For per-second limits, start with a 2 second wait plus random
      milliseconds, doubling the wait time for each retry up to 16 seconds. For daily quota limits,
      wait until after 12 midnight UTC.

      ## Filtering

      Use filters to narrow down results. The filter follows the pattern
      `filter='field' comparisonType 'value'`. The value can be enclosed with single quotes (') or double quotes (").

      ```bash
      GET {hostName}/{version}/contacts?filter=lastName eq 'Smith'
      ```

      To pass a single quote in the filter's value, use double quotes around the string.

      ```bash
      GET {hostName}/{version}/contacts?filter=lastName eq "O'Keenan"
      ```

      To pass a double quote, use double quotes around the string and escape each inner quote with `\`.

      ```bash
      GET {hostName}/{version}/events?filter=eventName eq "\"Yearly\" Conference"
      ```

      ## Versioning

      We track both backward-compatible and backward-incompatible changes.

      **Backward compatible:** Adding new resources, optional parameters, or attributes; changing format (not type) of IDs; increasing string field lengths.

      **Backward incompatible:** Adding required parameters; deleting resources or attributes; changing data types. When breaking changes occur, a new API version is released while the old version remains available temporarily.

      For documentation and guides, visit [developers.cvent.com](https://developers.cvent.com).
