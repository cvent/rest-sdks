      # Introduction
      The Cvent API Platform is built around REST, providing intuitive endpoints to leverage the Cvent platform
      for your event needs. The APIs use JSON-encoded requests/responses and HTTP codes. Resources are protected using OAuth2.

      # Getting Started

      This SDK is generated by [Speakeasy](https://speakeasy.com). For usage instructions, refer to the README
      and USAGE files. To obtain API credentials, visit the [Cvent REST API Overview](https://developers.cvent.com/docs/rest-api/overview).

      The Cvent REST API uses [OAuth2](https://oauth.net/2/) for authorization (client credentials flow).

      ## Endpoints

      | Region        | Hostname                           |
      |:--------------|:-----------------------------------|
      | North America | https://api-platform.cvent.com     |
      | Europe        | https://api-platform-eur.cvent.com |

      The current version is `ea`.

      ## Rate Limits

      | Tier     | Daily Calls | Calls/Sec | Max Burst |
      | -------- | ----------- | --------- | --------- |
      | Free     | 1,000       | 2         | 1         |
      | Standard | 15,000      | 10        | 10        |
      | Premium  | 500,000     | 25        | 25        |

      Daily quota resets at 12 midnight UTC. When limits are exceeded, the API returns `429 Too Many Requests`.
      Use exponential backoff to handle rate limit errors.

      ## Filtering

      Filter pattern: `filter=field comparisonType value`

      Example: `GET /contacts?filter=lastName eq Smith`

      ## Versioning

      **Backward compatible:** Adding resources, optional parameters, or attributes.

      **Backward incompatible:** Adding required parameters; deleting resources/attributes; changing data types.

      For more documentation, visit [developers.cvent.com](https://developers.cvent.com).
