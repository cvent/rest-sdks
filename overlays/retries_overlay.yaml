overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: Retries overlay
  version: 0.0.0
actions:
  - target: $
    update:
      x-speakeasy-retries:
  - target: $["x-speakeasy-retries"]
    update:
      strategy: backoff
      backoff:
        initialInterval: 1000 # 1000 milliseconds
        maxInterval: 60000 # 60 seconds
        maxElapsedTime: 3600000 # 1 hour
        exponent: 1.5
      statusCodes:
        - 429
        - 502
        - 503
        - 504
      retryConnectionErrors: true