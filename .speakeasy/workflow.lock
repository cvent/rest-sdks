workflow:
    workflowVersion: 1.0.0
    speakeasyVersion: 1.675.4
    sources:
        Public:
            inputs:
                - location: ./cvent-public-spec/openapi.yaml
            overlays:
                - location: ./overlays/public_overlay.yaml
                - location: ./overlays/operation_level_pagination_overlay.yaml
                - location: ./overlays/pagination_overlay.yaml
            registry:
                location: registry.speakeasyapi.dev/cvent/rest-sdks/public
    targets:
        public-csharp:
            target: csharp
            source: Public
            output: ./packages/csharp
            publish:
                nuget:
                    apiKey: $nuget_api_key
            codeSamples:
                registry:
                    location: registry.speakeasyapi.dev/cvent/rest-sdks/csharp
                labelOverride:
                    fixedValue: CSharp (SDK)
                blocking: false
        public-java:
            target: java
            source: Public
            output: ./packages/java
            publish:
                java:
                    ossrhUsername: $ossrh_username
                    ossrhPassword: $ossrh_password
                    gpgSecretKey: $java_gpg_secret_key
                    gpgPassPhrase: $java_gpg_passphrase
            codeSamples:
                registry:
                    location: registry.speakeasyapi.dev/cvent/rest-sdks/java
                labelOverride:
                    fixedValue: Java (SDK)
                blocking: false
        public-typescript:
            target: typescript
            source: Public
            output: ./packages/typescript
            publish:
                npm:
                    token: $npm_token
            codeSamples:
                registry:
                    location: registry.speakeasyapi.dev/cvent/rest-sdks/typescript
                labelOverride:
                    fixedValue: Typescript (SDK)
                blocking: false
